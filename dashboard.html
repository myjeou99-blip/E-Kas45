<body>
    <div class="mobile-container">

        <div class="balance-card-mini" id="mainCard" onclick="fetchLatestData()" 
     style="cursor: pointer; padding: 15px;

        <div id="modalGrafik" class="modal-overlay"><div class="modal-content"><span class="close-btn" onclick="closeModalGrafik()">&times;</span><h3 id="judulGrafik">Detail</h3><div style="max-width: 200px; margin: 20px auto;"><canvas id="chartKas"></canvas></div><div id="infoDetailGrafik"></div></div></div>
        <div id="modalRiwayat" class="modal-overlay">
    <div class="modal-content" style="height: 60vh; display: flex; flex-direction: column; margin-bottom: 80px;">

    <script>
        const urlWebID = "https://script.google.com/macros/s/AKfycbzGQGqDN3dpEiee2XAI2yCXK1tMDv0VjSaT6CicKBxvZhI6kG8UoNEcwYLwLxOVJSOAOA/exec";
        let rawRecords = [];
        let myChart = null;

        const dataKas = [
            { nama: "Kas ATK", saldo: 0, icon: "fa-pencil-alt", color: "bg-green" },
            { nama: "Kas Lapint", saldo: 0, icon: "fa-file-alt", color: "bg-yellow" },
            { nama: "Kas Kirka", saldo: 0, icon: "fa-chart-line", color: "bg-blue" },
            { nama: "Kas Progja", saldo: 0, icon: "fa-calendar-alt", color: "bg-red" },
            { nama: "Kas Harwat", saldo: 0, icon: "fa-tools", color: "bg-purple" },
            { nama: "Kas Khusus", saldo: 0, icon: "fa-key", color: "bg-dark" },
            { nama: "Kas Rakor", saldo: 0, icon: "fa-users", color: "bg-orange" },
            { nama: "Kas Giat Ops", saldo: 0, icon: "fa-briefcase", color: "bg-blue" } 
        ];

        function formatRupiah(n) { return "Rp " + new Intl.NumberFormat("id-ID").format(n || 0); }

        function updateDropdownAkun() {
            const selectAkun = document.getElementById("pilihKas"); 
            if (!selectAkun) return;
            selectAkun.innerHTML = '<option value="" disabled selected>-- Pilih Akun --</option>';
            dataKas.forEach(kas => {
                const option = document.createElement("option");
                option.value = kas.nama;
                option.textContent = kas.nama;
                selectAkun.appendChild(option);
            });
        }

        async function fetchLatestData() {
            const status = document.getElementById("lastUpdate");
            document.getElementById("mainCard").style.opacity = "0.5";
            status.innerText = "⏳ Memuat...";
            try {
                const res = await fetch(urlWebID + "?t=" + Date.now());
                rawRecords = await res.json();
                dataKas.forEach(k => k.saldo = 0);
                rawRecords.forEach(r => {
                    const i = dataKas.findIndex(k => k.nama.trim().toLowerCase() === r.akun.trim().toLowerCase());
                    if(i !== -1) {
                        let n = parseInt(r.nominal) || 0;
                        r.tipe.trim() === "Masuk" ? dataKas[i].saldo += n : dataKas[i].saldo -= n;
                    }
                });
                renderDashboard();
                updateDropdownAkun();
                const opsiTgl = { day: 'numeric', month: 'long', year: 'numeric' };
const tgl = new Date().toLocaleDateString('id-ID', opsiTgl);
const jam = new Date().toLocaleTimeString('id-ID').replace(/\./g, ':');

status.innerText = `Update: ${tgl} ${jam}`;
            } catch (e) { status.innerText = "❌ Gagal Sinkron"; }
            document.getElementById("mainCard").style.opacity = "1";
        }

        function renderDashboard() {
            const container = document.getElementById("kasContainer");
            let total = 0; container.innerHTML = "";
            dataKas.forEach(item => {
                total += item.saldo;
                container.innerHTML += `
    <div class="kas-card" onclick="tampilkanAnalisis('${item.nama}')" style="display: flex; align-items: center; background: white; padding: 12px 15px; margin-bottom: 8px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); cursor: pointer;">
        
        <div class="kas-icon ${item.color}" style="width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 1px; flex-shrink: 0;">
            <i class="fas ${item.icon}" style="font-size: 1.1em;"></i>
        </div>

        <div style="font-weight: 800; color: #333; font-size: 1em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
            ${item.nama} : ${formatRupiah(item.saldo)}
        </div>

    </div>
`;
            });
            document.getElementById("displayTotalSaldo").innerText = formatRupiah(total);
        }
// FUNGSI UNTUK MENAMPILKAN ANALISIS GRAFIK
function tampilkanAnalisis(namaKas) {
    // 1. Munculkan modal grafik
    const modal = document.getElementById("modalGrafik");
    if (modal) modal.style.display = "flex";
    
    document.getElementById("judulGrafik").innerText = "Analisis: " + namaKas;

    // 2. Filter data untuk kas yang dipilih
    const dataFilter = rawRecords.filter(r => r.akun.trim().toLowerCase() === namaKas.trim().toLowerCase());
    
    let masuk = 0;
    let keluar = 0;

    dataFilter.forEach(r => {
        let n = parseInt(r.nominal) || 0;
        if (r.tipe.trim() === "Masuk") masuk += n;
        else keluar += n;
    });

    // 3. Reset grafik lama agar tidak error
    if (window.myChart instanceof Chart) {
        window.myChart.destroy();
    }

    // 4. Gambar grafik baru
    const ctx = document.getElementById('chartKas').getContext('2d');
    window.myChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Masuk', 'Keluar'],
            datasets: [{
                data: [masuk, keluar],
                backgroundColor: ['#28a745', '#dc3545'],
                hoverOffset: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });

    // 5. Tampilkan rincian teks di bawah grafik
    document.getElementById("infoDetailGrafik").innerHTML = `
        <div style="margin-top:20px; text-align:left; border-top:1px solid #eee; pt:10px;">
            <p style="color:#28a745">🟢 Total Masuk: <b>${formatRupiah(masuk)}</b></p>
            <p style="color:#dc3545">🔴 Total Keluar: <b>${formatRupiah(keluar)}</b></p>
            <p style="font-weight:bold; margin-top:5px;">💰 Saldo: ${formatRupiah(masuk - keluar)}</p>
        </div>
    `;
}

// Tambahkan juga fungsi tutupnya
function closeModalGrafik() {
    document.getElementById("modalGrafik").style.display = "none";
}
        // FUNGSI MODAL
        function openModalTrans() { document.getElementById("modalTrans").style.display = "flex"; document.getElementById("tglTrans").valueAsDate = new Date(); }
        function closeModalTrans() { document.getElementById("modalTrans").style.display = "none"; }
        function openModalRiwayat() { document.getElementById("modalRiwayat").style.display = "flex"; renderRiwayat(); }
        function closeModalRiwayat() { document.getElementById("modalRiwayat").style.display = "none"; }

        function renderRiwayat() {
            const cont = document.getElementById("daftarRiwayat"); 
            cont.innerHTML = rawRecords.length ? "" : "<p>Data Kosong</p>";
            [...rawRecords].reverse().forEach(r => {
                cont.innerHTML += `<div class="riwayat-item ${r.tipe.toLowerCase()}"><b>${r.akun}</b> - ${formatRupiah(r.nominal)}<br><small>${r.tanggal} | ${r.keterangan}</small></div>`;
            });
        }

        // Cetak PDF (Fungsi Anda yang sudah ada)
        async function unduhPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const tglSekarang = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    const waktuSekarang = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace(/\./g, ':');

    // 1. HEADER
    doc.setFontSize(16);
    doc.setFont(undefined, 'bold');
    doc.text("LAPORAN KEUANGAN", 105, 15, { align: "center" });
    doc.setFontSize(9);
    doc.setFont(undefined, 'normal');
    doc.text(`Update: ${tglSekarang} ${waktuSekarang}`, 105, 22, { align: "center" });

    // 2. TABEL TRANSAKSI UTAMA
    doc.autoTable({
        startY: 30,
        head: [['Tanggal', 'Tipe', 'Akun', 'Nominal', 'Keterangan']],
        body: rawRecords.map(r => [
            (() => {
                let t = r.tanggal.toString().replace(/\//g, '-');
                const parts = t.split('-');
                let dObj = (parts[0].length === 2) ? new Date(`${parts[2]}-${parts[1]}-${parts[0]}`) : new Date(t);
                return isNaN(dObj) ? r.tanggal : dObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            })(),
            r.tipe, r.akun, formatRupiah(r.nominal), r.keterangan || "-"
        ]),
        theme: 'grid',
        headStyles: { fillColor: [40, 167, 69], halign: 'center' },
        styles: { fontSize: 8, cellPadding: 2 },
        columnStyles: { 
            0: { cellWidth: 25 }, 
            1: { cellWidth: 20, halign: 'center' }, 
            2: { cellWidth: 25 }, 
            3: { cellWidth: 30, halign: 'right' }, 
            4: { cellWidth: 'auto' } 
        }
    });

    // 3. TABEL RINGKASAN SALDO
    let finalY = doc.lastAutoTable.finalY + 15;
    doc.setFontSize(12);
    doc.setFont(undefined, 'bold');
    doc.text("RINGKASAN SALDO PER AKUN", 105, finalY, { align: "center" });

    const ringkasan = {};
    rawRecords.forEach(r => {
        if (!ringkasan[r.akun]) ringkasan[r.akun] = { masuk: 0, keluar: 0 };
        const nom = parseInt(r.nominal) || 0;
        if (r.tipe === "Masuk") ringkasan[r.akun].masuk += nom;
        else ringkasan[r.akun].keluar += nom;
    });

    const bodyRingkasan = Object.keys(ringkasan).map(nama => {
        const d = ringkasan[nama];
        return [nama, formatRupiah(d.masuk), formatRupiah(d.keluar), formatRupiah(d.masuk - d.keluar)];
    });

    const totalSemua = Object.values(ringkasan).reduce((a, b) => a + (b.masuk - b.keluar), 0);

    doc.autoTable({
        startY: finalY + 5,
        margin: { left: 45, right: 45 },
        head: [['Nama Akun', 'Total Masuk', 'Total Keluar', 'Saldo Akhir']],
        body: bodyRingkasan,
        foot: [[{ 
            content: `TOTAL KAS KESELURUHAN: ${formatRupiah(totalSemua)}`, 
            colSpan: 4, 
            styles: { halign: 'center', fillColor: [240, 240, 240], textColor: [0, 0, 0], fontStyle: 'bold' } 
        }]],
        theme: 'striped',
        headStyles: { fillColor: [52, 58, 64], halign: 'center' },
        styles: { fontSize: 8 },
        columnStyles: { 1: { halign: 'right' }, 2: { halign: 'right' }, 3: { halign: 'right' } }
    });

    // 4. TANDA TANGAN
    let finalY2 = doc.lastAutoTable.finalY + 15;
    const xPosTTD = 165; 
    doc.setFontSize(10);
    doc.setFont(undefined, 'normal');
    doc.text(`Jakarta, ${tglSekarang}`, 145, finalY2 -3, { align: "center" }); 
doc.text("Bendahara,", 145, finalY2 + 2, { align: "center" });
doc.text("( ____________________ )", 145, finalY2 + 25, { align: "center" });

    doc.save(`Laporan Kas : ${tglSekarang}.pdf`);
}


        document.getElementById("formTransaksi").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btnSimpan");
            btn.innerText = "⏳ Menyimpan...";
            const payload = {
                tanggal: document.getElementById("tglTrans").value,
                akun: document.getElementById("pilihKas").value,
                nominal: document.getElementById("nominal").value,
                keterangan: document.getElementById("ket").value,
                tipe: document.querySelector('input[name="tipe"]:checked').value
            };
            await fetch(urlWebID, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            alert("Data tersimpan!");
            closeModalTrans();
            fetchLatestData();
            btn.innerText = "SIMPAN DATA";
        };

        function logout() { sessionStorage.clear(); window.location.href = "index.html"; }

        // PROTEKSI ROLE
        
     const secureUser = sessionStorage.getItem("current_user");
    if (!secureUser) {
        window.location.href = "index.html";
    }
        document.addEventListener("DOMContentLoaded", function() {
    const role = sessionStorage.getItem("current_role");
    const user = sessionStorage.getItem("current_user");
    const welcomeArea = document.getElementById("welcomeUser");

    // Tampilkan nama user di pojok kanan atas
    if (user && welcomeArea) {
        welcomeArea.innerText = "Halo, " + user;
    }

    // CEK ROLE: Jika admin, tambahkan class 'is-admin' ke body agar tombol muncul
    if (role === "admin") {
        document.body.classList.add("is-admin");
    } else {
        console.log("Mode: Hanya Lihat (Tamu)");
    }
});

        window.onload = fetchLatestData;
    </script>
    <script>
// --- MASUKKAN DI SINI ---
    function loadDashboard() {
        /// 1. Sembunyikan SEMUA elemen yang menutupi layar (Modal, Riwayat, dll)
    // Kita cari elemen berdasarkan ID atau Class yang umum digunakan
    const overlays = [
        document.getElementById('modalRiwayat'), // Ganti dengan ID elemen Riwayat Anda
        document.querySelector('.modal'),
        document.querySelector('.riwayat-container') // Tambahkan class container riwayat Anda
    ];

    overlays.forEach(el => {
        if (el) el.style.display = 'none';
    });

    // 2. Jika Anda menggunakan tombol silang (X) yang memicu fungsi tertentu
    // Anda bisa memanggil fungsi tutup tersebut di sini (misal: closeRiwayat())
    if (typeof closeRiwayat === "function") {
        closeRiwayat();
    }

    // 3. Scroll kembali ke posisi paling atas
    window.scrollTo({ top: 0, behavior: 'smooth' });

    // 4. Pastikan data dashboard tetap segar tanpa reload total
    if (typeof fetchLatestData === "function") {
        fetchLatestData();
    }
}

 // 1. Letakkan fungsi pengecek update di sini
        function checkAppUpdate(registration) {
            registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        if (confirm("Versi terbaru Dompet45 tersedia! Muat ulang sekarang?")) {
                            window.location.reload();
                        }
                    }
                });
            });
        }

        // 2. Kemudian pendaftaran Service Worker di bawahnya
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(reg => {
                        console.log('SW Berhasil didaftarkan');
                        checkAppUpdate(reg); // Memanggil fungsi di atas
                    })
                    .catch(err => console.log('SW Gagal:', err));
            });
        }
</script>
